<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FirstPen 管理画面</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/grapesjs@0.21.10/dist/css/grapes.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/grapesjs-preset-newsletter@1.0.2/dist/index.css">
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen" class="hidden">
  <div class="login-box">
    <div class="login-logo">✦ FirstPen Admin</div>
    <h1 class="login-title">管理画面ログイン</h1>
    <div class="form-row">
      <label>ユーザー名</label>
      <input type="text" id="l-user" class="input" value="admin" autocomplete="username">
    </div>
    <div class="form-row">
      <label>パスワード</label>
      <input type="password" id="l-pass" class="input" placeholder="パスワードを入力" autocomplete="current-password">
    </div>
    <div id="l-err" class="login-err hidden"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="App.doLogin()">ログイン</button>
  </div>
</div>

<div id="app" class="hidden">
  <!-- サイドバー -->
  <aside class="sidebar">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <div>
        <div class="logo-title">FirstPen</div>
        <div class="logo-sub">Admin Console</div>
      </div>
    </div>

    <nav class="nav">
      <a href="#/dashboard"   class="nav-link" data-route="dashboard">📊 ダッシュボード</a>
      <a href="#/subscribers" class="nav-link" data-route="subscribers">👥 登録者一覧</a>
      <a href="#/tags"        class="nav-link" data-route="tags">🏷  タグ・セグメント</a>
      <a href="#/templates"   class="nav-link" data-route="templates">📄 テンプレート</a>
      <a href="#/campaigns"       class="nav-link" data-route="campaigns">📣 手動メール送信</a>
      <a href="#/newsletters"     class="nav-link" data-route="newsletters">📰 メールマガジン</a>
      <a href="#/scenario-flows"  class="nav-link" data-route="scenario-flows">🔀 シナリオ</a>
      <a href="#/step-flows"      class="nav-link" data-route="step-flows">⏱  ステップメール</a>
      <a href="#/sender-settings" class="nav-link" data-route="sender-settings">📧 送信者設定</a>
      <a href="#/settings"        class="nav-link" data-route="settings">⚙️  設定</a>
    </nav>

    <div class="side-foot">
      <div id="api-status" class="api-status">API: <span>確認中...</span></div>
      <button class="btn btn-ghost btn-sm" onclick="App.logout()" style="margin-top:6px;width:100%">ログアウト</button>
      <div class="side-version">v2.0.0</div>
    </div>
  </aside>

  <!-- メイン -->
  <main class="main">
    <header class="topbar">
      <div id="breadcrumb" class="breadcrumb">ダッシュボード</div>
      <div class="topbar-right">
        <button id="reload-btn" class="btn-icon" title="リロード">🔄</button>
      </div>
    </header>

    <div id="view" class="view"><div class="loading">読み込み中...</div></div>
  </main>
</div>

<!-- モーダル -->
<div id="modal" class="modal hidden">
  <div class="modal-bg" onclick="App.closeModal()"></div>
  <div class="modal-panel">
    <div class="modal-head"><div id="modal-title"></div><button class="btn-icon" onclick="App.closeModal()">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- トースト -->
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/grapesjs@0.21.10/dist/grapes.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/grapesjs-preset-newsletter@1.0.2/dist/index.js"></script>
<script src="app.js"></script>
</body>
</html>
